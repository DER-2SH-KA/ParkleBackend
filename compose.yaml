services:
  spring:
    build: .
    # image: parkle
    container_name: spring_parkle
    hostname: spring_parkle
    ports:
      - "8388:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_SECURITY_BCRYPT_STRENGTH: ${SPRING_SECURITY_BCRYPT_STRENGTH}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
    networks:
      - backend_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/api/auth/ping || exit 1" ]
      interval: 20s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 500m
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 30s

  #scraper:
  #  build: ./ext/scraper
  #  container_name: parkle_scraper_go
  #  expose:
  #    - "9001"

  postgres:
    image: postgres:16.9
    container_name: postgres_parkle
    hostname: postgres_parkle
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 20s
      retries: 5
      timeout: 10s
    deploy:
      resources:
        limits:
          memory: 200m
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 10s

  redis:
    image: redis:alpine3.22
    container_name: redis_parkle
    hostname: redis_parkle
    expose:
      - "6379"
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 200m
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 10s

  dozzle:
    image: amir20/dozzle:v10
    container_name: dozzle_parkle
    hostname: dozzle_parkle
    ports:
      - "9999:8080"
    environment:
      DOZZLE_BASE: /dozzle/ui
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 20s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 200m
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 10s

volumes:
  postgres_data:

networks:
  backend_network:
    driver: bridge
